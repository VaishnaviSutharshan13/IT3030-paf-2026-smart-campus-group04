spring.application.name=smart-campus-operations-hub

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_campus_hub
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OAuth2 Google login (set real values via env/secret manager)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace_me}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace_me}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT
app.jwt.secret=${APP_JWT_SECRET:change_me_change_me_change_me_change_me_1234567890}
app.jwt.expiration-ms=3600000

# OAuth2 login redirect to frontend
app.oauth2.frontend-success-url=${APP_FRONTEND_SUCCESS_URL:http://localhost:5173/auth/callback}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:*,http://127.0.0.1:*}
